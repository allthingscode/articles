baseURL = 'https://allthingscode.github.io/articles/'
languageCode = 'en'
title = 'All Things Code - Articles'
theme = 'PaperMod'

[params]
  author = "Matthew Hayes"
  authorLinkedin = "https://www.linkedin.com/in/matthew-l-hayes/"
  defaultTheme = "dark"
  disableThemeToggle = false
  disableSpecial1stPost = true
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true

  [params.homeInfoParams]
    Title = "About This Site"
    Content = """
I write about AI-assisted software development and the practical intersection of agentic systems and deterministic code.  
This site captures the patterns I have found, the mistakes I have seen, and the corrections that actually move work forward.  
I am focused on improving quality and velocity without losing engineering discipline.
"""

  [params.articleSignature]
    tagline = "The Pragmatic Agentic Solutions Architect (Matthew Hayes)"

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      typographer = false
