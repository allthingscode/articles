/* ── shared ─────────────────────────────────────────────────── */
function SectionHeader({ children }) {
  return (
    <div style={{ marginBottom: 8, marginTop: 2 }}>
      <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', color: ACCENT, marginBottom: 3 }}>{children}</div>
      <div style={{ height: 1, background: ACCENT, opacity: 0.2 }} />
    </div>
  );
}

function Bullets({ items, size = 10.5 }) {
  return (
    <ul style={{ paddingLeft: 13, margin: '3px 0 0' }}>
      {items.map((b, i) => (
        <li key={i} style={{ fontSize: size, lineHeight: 1.5, color: '#1e1e1e', marginBottom: 2.5 }}>{b}</li>
      ))}
    </ul>
  );
}

function CompanyBlock({ job }) {
  return (
    <div style={{ marginBottom: 13, breakInside: 'avoid' }}>
      <div style={{ fontSize: 12, fontWeight: 800, color: ACCENT, marginBottom: 4, letterSpacing: '0.02em' }}>{job.company}</div>
      {job.roles.map((r, i) => (
        <div key={i} style={{ marginBottom: 8 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 6, marginBottom: 3 }}>
            <div style={{ fontSize: 11.5, fontWeight: 700, color: '#111', lineHeight: 1.2 }}>{r.title}</div>
            <div style={{ fontSize: 10, color: '#888', whiteSpace: 'nowrap', flexShrink: 0 }}>{r.period}</div>
          </div>
          <Bullets items={r.bullets} size={10} />
        </div>
      ))}
    </div>
  );
}

function PhotoPlaceholder({ size = 90, width, height }) {
  const w = width || size;
  const h = height || size;
  return (
    <div style={{
      width: w, height: h, borderRadius: 3, flexShrink: 0,
      overflow: 'hidden',
      border: '2px solid rgba(255,255,255,0.22)',

      <img src="uploads/1000007237_profile.jpg" alt="Matthew Hayes" style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center 15%' }} />

}

// Auto-print after fonts + Babel settle
document.fonts.ready.then(() => {
  setTimeout(() => window.print(), 800);
});

</body>
