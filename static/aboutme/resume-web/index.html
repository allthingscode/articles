/* ── shared components ─────────────────────────────────────── */
function PhotoPlaceholder({ size = 90, width, height }) {
  const w = width || size;
  const h = height || size;
  return (
    <div style={{
      width: w, height: h, borderRadius: 3, flexShrink: 0,
      overflow: 'hidden',

function SectionHeader({ children, accent, small }) {
  return (
    <div style={{ marginBottom: small ? 6 : 8, marginTop: 2 }}>
      <div style={{
        fontSize: small ? 8.5 : 9.5,
        fontWeight: 700,
        letterSpacing: '0.2em',
        textTransform: 'uppercase',

        fontFamily: 'Barlow, sans-serif',
        marginBottom: 3,
      }}>{children}</div>
      <div style={{ height: 1, background: accent, opacity: 0.2 }} />
    </div>
  );
}

function Bullets({ items, size = 9 }) {
  return (
    <ul style={{ paddingLeft: 13, margin: '3px 0 0' }}>
      {items.map((b, i) => (
        <li key={i} style={{ fontSize: size, lineHeight: 1.55, color: '#2a2a2a', marginBottom: 2.5 }}>{b}</li>

}

        <TweakColor label="Header Color"  value={t.headerColor}  onChange={v => setTweak('headerColor', v)} />
        <TweakColor label="Accent Color"  value={t.accentColor}  onChange={v => setTweak('accentColor', v)} />
        <TweakColor label="Body BG"       value={t.bodyBg}       onChange={v => setTweak('bodyBg', v)} />
        <TweakSlider label="Name Size" min={36} max={80} step={2} value={t.nameSize} onChange={v => setTweak('nameSize', v)} />
        <TweakToggle label="Show Photo"   value={t.showPhoto}    onChange={v => setTweak('showPhoto', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
